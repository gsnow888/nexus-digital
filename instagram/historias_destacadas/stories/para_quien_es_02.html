<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Quién Es 02 – Nexus Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #555;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 0;
      font-family: 'Inter', sans-serif;
    }

    .instructions {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      line-height: 1.5;
      padding: 8px 12px;
      border-radius: 6px;
      z-index: 9999;
      text-align: right;
    }

    .story {
      width: 1080px;
      height: 1920px;
      flex-shrink: 0;
      background: #0F1419;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      width: 100%;
      height: 12px;
      background: linear-gradient(90deg, #39FF14 0%, #00D9FF 50%, #39FF14 100%);
      flex-shrink: 0;
    }

    .bg-glow-1 {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(57,255,20,0.07) 0%, transparent 70%);
      top: -150px;
      left: -150px;
    }
    .bg-glow-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(57,255,20,0.05) 0%, transparent 70%);
      bottom: 200px;
      right: -80px;
    }

    .grid-accent {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(57,255,20,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,255,20,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 70px 80px 80px;
      position: relative;
      z-index: 2;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(57,255,20,0.15);
      border: 2px solid #39FF14;
      color: #39FF14;
      font-family: 'Poppins', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 12px 28px;
      border-radius: 50px;
      align-self: flex-start;
      margin-bottom: 48px;
    }

    .headline {
      font-family: 'Poppins', sans-serif;
      font-size: 64px;
      font-weight: 900;
      line-height: 1.15;
      color: #F8FAFC;
      margin-bottom: 64px;
    }
    .headline span { color: #39FF14; }

    /* ── Flow diagram ── */
    .flow-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: 60px;
    }

    .flow-node {
      background: rgba(57,255,20,0.08);
      border: 2px solid rgba(57,255,20,0.35);
      border-radius: 20px;
      padding: 30px 40px;
      width: 100%;
      text-align: center;
    }

    .flow-node-text {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #F8FAFC;
    }

    .flow-arrow {
      width: 4px;
      height: 44px;
      background: linear-gradient(to bottom, #39FF14, rgba(57,255,20,0.3));
      position: relative;
      margin: 0 auto;
    }

    .flow-arrow::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 18px solid rgba(57,255,20,0.6);
    }

    /* Question node */
    .flow-question {
      background: rgba(157,78,221,0.1);
      border: 2px solid rgba(157,78,221,0.4);
      border-radius: 20px;
      padding: 30px 40px;
      width: 100%;
      text-align: center;
    }

    .flow-question-text {
      font-family: 'Poppins', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #9D4EDD;
    }

    /* Split paths */
    .split-row {
      display: flex;
      gap: 20px;
      width: 100%;
      margin-top: 16px;
    }

    .path-yes {
      flex: 1;
      background: rgba(57,255,20,0.1);
      border: 2px solid #39FF14;
      border-radius: 20px;
      padding: 28px 20px;
      text-align: center;
    }

    .path-yes-label {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #39FF14;
      margin-bottom: 8px;
    }

    .path-yes-text {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: rgba(248,250,252,0.85);
    }

    .path-no {
      flex: 1;
      background: rgba(255,60,60,0.08);
      border: 2px solid rgba(255,60,60,0.4);
      border-radius: 20px;
      padding: 28px 20px;
      text-align: center;
    }

    .path-no-label {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #FF3C3C;
      margin-bottom: 8px;
    }

    .path-no-text {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: rgba(248,250,252,0.85);
    }

    /* Question line */
    .question-line {
      font-family: 'Poppins', sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: #F8FAFC;
      text-align: center;
      margin-bottom: 44px;
    }
    .question-line span { color: #39FF14; }

    /* CTA */
    .cta-box {
      background: linear-gradient(135deg, #39FF14 0%, #00D9FF 100%);
      border-radius: 20px;
      padding: 38px 48px;
      text-align: center;
      margin-top: auto;
    }

    .cta-text {
      font-family: 'Poppins', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #0F1419;
    }

    .brand-footer {
      margin-top: 32px;
      text-align: center;
    }

    .brand-name {
      font-family: 'Poppins', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: rgba(248,250,252,0.3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="instructions">
    <strong>para_quien_es_02.html</strong><br />
    1080 × 1920 px<br />
    Nexus Digital Stories
  </div>

  <div class="story">
    <div class="top-bar"></div>
    <div class="grid-accent"></div>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="content">

      <div class="section-tag">🎯 Para Quién Es</div>

      <h1 class="headline">Si tus clientes<br />te buscan <span>online...</span></h1>

      <!-- Flow diagram -->
      <div class="flow-wrapper">

        <div class="flow-node">
          <span class="flow-node-text">🔍 Cliente busca tu servicio</span>
        </div>

        <div class="flow-arrow"></div>

        <div class="flow-node">
          <span class="flow-node-text">📱 Busca en Google</span>
        </div>

        <div class="flow-arrow"></div>

        <div class="flow-question">
          <span class="flow-question-text">¿Apareces?</span>
        </div>

        <div class="split-row">
          <div class="path-yes">
            <div class="path-yes-label">SÍ ✅</div>
            <div class="path-yes-text">Te contratan</div>
          </div>
          <div class="path-no">
            <div class="path-no-label">NO ❌</div>
            <div class="path-no-text">Contratan a otro</div>
          </div>
        </div>

      </div>

      <p class="question-line">¿De qué lado<br />quieres <span>estar?</span></p>

      <!-- CTA -->
      <div class="cta-box">
        <p class="cta-text">Asegura tu lugar → 🔗 Link en bio</p>
      </div>

      <div class="brand-footer">
        <span class="brand-name">Nexus Digital</span>
      </div>

    </div>
  </div>

</body>
</html>
